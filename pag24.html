<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina24</title>
    <link rel="stylesheet" href="estils.css">
</head>

<body>

    <header>
        <a href="index.html" class="btn-home-nav">Home</a>
        <a href="#" class="logo">E-Placement</a>
    </header>

    <div id="main-container">

        <div class="device-wrapper">
            <div class="device-box">
                <div style="width: 249px; height: 249px; background: black; border-radius: 15px"></div>
                
                <div style="width: 216px; height: 171px; left: 20px; top: 38px; position: absolute; background: #F2F2F2">
                    <div style="left: 25px; top: 145px; position: absolute; color: black; font-size: 16px; font-weight: 400;">YES</div>
                    <div style="left: 80px; top: 145px; position: absolute; color: black; font-size: 16px; font-weight: 400;">REPEAT</div>
                    <div style="left: 165px; top: 145px; position: absolute; color: black; font-size: 16px; font-weight: 400;">NO</div>
                    <div style="width: 155px; height: 54px; left: 40px; top: 30px; position: absolute; color: black; font-size: 20px; font-weight: 400; line-height: 1.2;">Have the leds lit up correctly?</div>
                </div>

                <a href="pag25.html" style="width: 50px; height: 25px; left: 37px; top: 219px; position: absolute; background: #D9D9D9; border-radius: 5px; cursor: pointer;"></a>

                <a href="pag23.html" style="width: 50px; height: 25px; left: 105px; top: 219px; position: absolute; background: #D9D9D9; border-radius: 5px; cursor: pointer;"></a>
                
                <a id="btn-no" href="#" style="width: 50px; height: 25px; left: 172px; top: 219px; position: absolute; background: #D9D9D9; border-radius: 5px; cursor: pointer;"></a>
             </div>    
        </div>

        <div class="face-wrapper">
            <img class="face-img" src="imatges/cara.png" alt="Cara" />
            <img class="line-h" src="imatges/tira1-pag2.png" alt="Linia H" />
            <img class="line-v" src="imatges/tira2-pag2.png" alt="Linia V" />

            <img class="cylon-highlight-vertical moviment-cylon-vertical" src="imatges/CylonBlau.png" alt="Animacio destacar" />
        </div>

        <div class="side-images-group">
            
            <div class="side-image-wrapper side-img-pos-1">
                <img class="side-image" src="imatges/imatge1-pag5.png" alt="Imatge Lateral 1" />
            </div>

            <div class="side-image-wrapper side-img-pos-2">
                <img class="side-image" src="imatges/imatge2-pag5.png" alt="Imatge Lateral 2" />
            </div>

        </div>

    </div>

    <script>
    const btnNo = document.getElementById('btn-no');

    btnNo.addEventListener('click', function(e) {
        e.preventDefault(); // Evita que salti a dalt de la pàgina
        localStorage.setItem('errorLeds', 'cert'); // Guardem la decisió
        window.location.href = 'pag25.html'; // Saltem a la pàgina 25
    });
    </script>

    <script>
    window.addEventListener('load', function() {
        window.scrollTo(0, 120); 
    });
    </script>

</body>
</html>
